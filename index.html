<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="スマートフォンで使いやすい週間タイムブロッカー">
  <meta name="theme-color" content="#1B2A3F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="週間ブロッカー">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>週間タイムブロッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --navy: #1B2A3F;
      --indigo: #4B6BFB;
      --indigo-light: #EEF2FF;
      --urgent: #DC2626;
      --urgent-light: #FEF2F2;
      --high: #D97706;
      --high-light: #FFF7ED;
      --normal: #4B6BFB;
      --normal-light: #EEF2FF;
      --low: #059669;
      --low-light: #ECFDF5;
      --g100: #F7F8FB;
      --g200: #E8ECF2;
      --g400: #8A96A8;
      --g600: #5A6478;
      --white: #fff;
      --sat: #EBF5FF;
      --sun: #FFF3F3;
      --header-h: 56px;
      --dayrow-h: 52px;
      --cell-h: 60px;
      --tlbl-w: 44px;
      --day-col-min: 96px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
      background: var(--g100);
      color: var(--navy);
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1.5px solid var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 300;
    }
    .app-title { font-size: 15px; font-weight: 700; }
    .nav { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--g200); border-radius: 8px;
      background: var(--white); font-size: 18px; color: var(--g600);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none;
    }
    .nav-btn:active { background: var(--g100); }
    .week-lbl { font-size: 12px; color: var(--g600); font-weight: 500; text-align: center; min-width: 120px; }
    .today-btn {
      font-size: 12px; padding: 6px 12px;
      border: 1px solid var(--g200); border-radius: 8px;
      background: var(--white); color: var(--g600); font-weight: 600;
      cursor: pointer;
    }
    .today-btn:active { background: var(--g100); }

    /* ── Main scroll area ── */
    .scroll-area {
      position: fixed;
      top: var(--header-h);
      bottom: 0; left: 0; right: 0;
      overflow-y: auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }

    .backup-fab {
      position: fixed;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 260;
      border: 1px solid var(--navy);
      border-radius: 12px;
      background: var(--navy);
      color: #fff;
      padding: 11px 13px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      box-shadow: 0 10px 28px rgba(27, 42, 63, .22);
      cursor: pointer;
    }
    .backup-fab:active { background: #111D2E; transform: translateY(1px); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: var(--tlbl-w) repeat(7, minmax(var(--day-col-min), 1fr));
      width: 100%;
      min-width: 716px;
      padding-bottom: 82px;
    }

    /* Day header row — sticky inside scroll */
    .dh-corner {
      height: var(--dayrow-h);
      background: var(--g100);
      border-bottom: 1px solid var(--g200);
      position: sticky; top: 0; left: 0; z-index: 160;
    }
    .dh {
      height: var(--dayrow-h);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--white);
      border-bottom: 1px solid var(--navy);
      border-left: 1px solid var(--g200);
      position: sticky; top: 0; z-index: 100;
      cursor: default;
    }
    .dh.sat { background: var(--sat); }
    .dh.sun { background: var(--sun); }
    .dh.today .dnum { color: var(--indigo); }
    .dh.today { border-bottom: 2px solid var(--indigo); }
    .dname { font-size: 10px; font-weight: 700; color: var(--g400); letter-spacing: .08em; }
    .dnum { font-size: 19px; font-weight: 700; line-height: 1.2; margin-top: 1px; }

    /* Time label */
    .tlbl {
      height: var(--cell-h);
      font-size: 10px; color: var(--g400);
      text-align: right; padding-right: 6px; padding-top: 6px;
      border-top: 1px solid var(--g200);
      background: var(--g100);
      font-weight: 500; letter-spacing: .02em;
      user-select: none;
      position: sticky; left: 0; z-index: 60;
    }

    /* Cell */
    .cell {
      height: var(--cell-h);
      border-top: 1px solid var(--g200);
      border-left: 1px solid var(--g200);
      position: relative;
      cursor: pointer;
      background: var(--white);
      -webkit-user-select: none;
    }
    .cell.sat { background: #F6FBFF; }
    .cell.sun { background: #FFF7F7; }
    .cell:active { background: var(--indigo-light); }
    .cell.has-ev { cursor: pointer; }
    .cell.has-ev:active { background: var(--white); }

    /* Event pill */
    .ev {
      position: absolute;
      left: 0;
      right: 2px;
      min-height: 30px;
      border-left: 3px solid var(--normal);
      border-radius: 0 5px 5px 0;
      background: var(--normal-light);
      padding: 5px 6px;
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: center;
      z-index: 5;
      box-shadow: 0 5px 12px rgba(27, 42, 63, .08);
    }
    .ev:active { filter: brightness(.98); }
    .ev.p-urgent { border-left-color: var(--urgent); background: var(--urgent-light); }
    .ev.p-high { border-left-color: var(--high); background: var(--high-light); }
    .ev.p-normal { border-left-color: var(--normal); background: var(--normal-light); }
    .ev.p-low { border-left-color: var(--low); background: var(--low-light); }
    .ev-title {
      font-size: 12px; font-weight: 700; color: var(--normal);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.25;
    }
    .ev.p-urgent .ev-title { color: var(--urgent); }
    .ev.p-high .ev-title { color: var(--high); }
    .ev.p-normal .ev-title { color: var(--normal); }
    .ev.p-low .ev-title { color: var(--low); }
    .ev-time {
      font-size: 10px; color: var(--g600);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2; margin-bottom: 2px;
    }
    .ev-memo {
      font-size: 10px; color: var(--g600);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .ev.compact .ev-time,
    .ev.compact .ev-memo { display: none; }

    /* ── Bottom Sheet Modal ── */
    .sheet-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,20,40,.4);
      z-index: 500;
      align-items: flex-end;
    }
    .sheet-overlay.on { display: flex; }

    .sheet {
      width: 100%;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 0 20px 32px;
      box-shadow: 0 -8px 40px rgba(10,20,40,.18);
      animation: slideUp .28s cubic-bezier(.32,1.18,.5,1);
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--g200); border-radius: 2px;
      margin: 12px auto 20px;
    }

    .s-day { font-size: 11px; font-weight: 700; color: var(--g400); letter-spacing: .08em; text-transform: uppercase; }
    .s-time { font-size: 21px; font-weight: 700; margin: 3px 0 16px; }
    .s-lbl {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--g400); letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .s-inp, .s-txt, .s-select {
      width: 100%; border: 1.5px solid var(--g200); border-radius: 10px;
      padding: 12px 14px; font-size: 15px; color: var(--navy);
      outline: none; font-family: inherit; margin-bottom: 16px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--white);
    }
    .s-inp:focus, .s-txt:focus, .s-select:focus {
      border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(75,107,251,.12);
    }
    .s-txt { resize: none; height: 88px; }
    .s-time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .prio-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 16px;
    }
    .prio-btn {
      min-height: 42px;
      border: 1.5px solid var(--g200);
      border-radius: 10px;
      background: var(--white);
      color: var(--g600);
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
    }
    .prio-btn::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--normal);
      flex: 0 0 auto;
    }
    .prio-btn.p-urgent::before { background: var(--urgent); }
    .prio-btn.p-high::before { background: var(--high); }
    .prio-btn.p-normal::before { background: var(--normal); }
    .prio-btn.p-low::before { background: var(--low); }
    .prio-btn.on.p-urgent { border-color: var(--urgent); background: var(--urgent-light); color: var(--urgent); }
    .prio-btn.on.p-high { border-color: var(--high); background: var(--high-light); color: var(--high); }
    .prio-btn.on.p-normal { border-color: var(--normal); background: var(--normal-light); color: var(--normal); }
    .prio-btn.on.p-low { border-color: var(--low); background: var(--low-light); color: var(--low); }

    .s-acts { display: flex; flex-direction: column; gap: 10px; }
    .s-save {
      width: 100%; padding: 15px;
      background: var(--indigo); color: #fff;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .s-save:active { background: #3a5be0; }
    .s-row { display: flex; gap: 10px; }
    .s-del {
      flex: 1; padding: 13px;
      background: #FEF2F2; color: #DC2626;
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .s-del:active { background: #FEE2E2; }
    .s-cancel {
      flex: 1; padding: 13px;
      background: var(--g100); color: var(--g600);
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .s-cancel:active { background: var(--g200); }

    /* ── Backup ── */
    .backup-sheet { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
    .b-title { font-size: 19px; font-weight: 700; margin-bottom: 5px; }
    .b-meta { font-size: 12px; color: var(--g600); line-height: 1.5; margin-bottom: 18px; }
    .b-section {
      border-top: 1px solid var(--g200);
      padding-top: 14px;
      margin-top: 14px;
    }
    .b-lbl {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--g400);
      letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .b-actions { display: flex; flex-direction: column; gap: 10px; }
    .b-primary,
    .b-secondary,
    .b-danger,
    .b-close {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    .b-primary { background: var(--indigo); color: #fff; }
    .b-primary:active { background: #3a5be0; }
    .b-secondary { background: var(--g100); color: var(--g600); border: 1px solid var(--g200); }
    .b-secondary:active { background: var(--g200); }
    .b-danger { background: #FEF2F2; color: #DC2626; }
    .b-danger:active { background: #FEE2E2; }
    .b-close { background: transparent; color: var(--g600); margin-top: 12px; }
    .b-close:active { background: var(--g100); }
    .b-review {
      display: none;
      border: 1.5px solid var(--g200);
      border-radius: 12px;
      padding: 13px;
      margin-top: 14px;
      background: #FBFCFF;
    }
    .b-review.on { display: block; }
    .b-review-title { font-size: 14px; font-weight: 700; margin-bottom: 9px; }
    .b-list { display: grid; gap: 7px; margin-bottom: 12px; }
    .b-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; color: var(--g600); }
    .b-row strong {
      color: var(--navy);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .b-status {
      min-height: 18px;
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--g600);
    }
    .b-status.ok { color: #047857; }
    .b-status.warn { color: #B45309; }
    .b-status.err { color: #DC2626; }

    /* ── Print ── */
    @media print {
      html,body { height: auto; overflow: visible; }
      .header { position: static; }
      .scroll-area { position: static; overflow: visible; }
      .cell:active { background: var(--white); }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="app-title">📅 週間ブロッカー</span>
  <div class="nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <span class="week-lbl" id="wlbl"></span>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
  </div>
  <button class="today-btn" onclick="goToday()">今週</button>
</div>

<!-- Scrollable grid -->
<div class="scroll-area">
  <div class="grid" id="grid"></div>
</div>

<button class="backup-fab" onclick="openBackupSheet()" aria-label="バックアップ">バックアップ</button>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="ov">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="s-day" id="sDay"></div>
    <div class="s-time" id="sTime"></div>
    <div class="s-time-row">
      <div>
        <label class="s-lbl" for="sStart">開始</label>
        <select class="s-select" id="sStart"></select>
      </div>
      <div>
        <label class="s-lbl" for="sEnd">終了</label>
        <select class="s-select" id="sEnd"></select>
      </div>
    </div>
    <label class="s-lbl">優先度</label>
    <div class="prio-row" id="sPriority"></div>
    <label class="s-lbl">タイトル</label>
    <input class="s-inp" id="sTitle" placeholder="例：会議、勉強、食事…" enterkeyhint="done"/>
    <label class="s-lbl">メモ・備考</label>
    <textarea class="s-txt" id="sMemo" placeholder="場所、準備するものなど…"></textarea>
    <div class="s-acts">
      <button class="s-save" onclick="saveEv()">保存する</button>
      <div class="s-row">
        <button class="s-del" id="sDel" onclick="delEv()" style="display:none">削除</button>
        <button class="s-cancel" onclick="closeSheet()">閉じる</button>
      </div>
    </div>
  </div>
</div>

<!-- Backup Sheet -->
<div class="sheet-overlay" id="backupOv">
  <div class="sheet backup-sheet">
    <div class="sheet-handle"></div>
    <div class="b-title">バックアップ</div>
    <div class="b-meta" id="bSummary"></div>

    <div class="b-actions">
      <button class="b-primary" onclick="exportBackup()">バックアップを書き出す</button>
      <button class="b-secondary" onclick="chooseBackupFile()">バックアップを読み込む</button>
    </div>
    <input id="bFile" type="file" accept=".json,application/json" style="display:none" onchange="handleImportFile(this.files[0])">

    <div class="b-review" id="bReview">
      <div class="b-review-title">読み込み確認</div>
      <div class="b-list">
        <div class="b-row"><span>ファイル</span><strong id="bFileName"></strong></div>
        <div class="b-row"><span>予定</span><strong id="bCount"></strong></div>
        <div class="b-row"><span>同じ枠</span><strong id="bOverlap"></strong></div>
        <div class="b-row"><span>出力日時</span><strong id="bExportedAt"></strong></div>
        <div class="b-row"><span>形式</span><strong id="bSource"></strong></div>
      </div>
      <div class="b-actions">
        <button class="b-secondary" onclick="applyPendingImport('merge')">今の予定を保存して追加/上書き</button>
        <button class="b-danger" onclick="applyPendingImport('replace')">今の予定を保存して置き換え</button>
      </div>
    </div>

    <div class="b-status" id="bStatus" role="status"></div>
    <button class="b-close" onclick="closeBackupSheet()">閉じる</button>
  </div>
</div>

<script>
const HOURS = Array.from({length:17},(_,i)=>i+6);
const DAY_START = 6 * 60;
const DAY_END = 23 * 60;
const SLOT_MIN = 15;
const CELL_H = 60;
const DJP   = ['月','火','水','木','金','土','日'];
const STORE  = 'tblocker_v2';
const BACKUP_KIND = 'weekly-time-blocker-mobile-backup';
const PRIORITY_ORDER = ['urgent','high','normal','low'];
const PRIORITIES = {
  urgent: {label:'最優先', cls:'p-urgent'},
  high: {label:'高', cls:'p-high'},
  normal: {label:'通常', cls:'p-normal'},
  low: {label:'低', cls:'p-low'}
};

let evs={}, wk=0, curKey=null, curDay=0, pendingImport=null, selectedPriority='normal';

/* ── Storage ── */
function load(){
  try{
    const raw=JSON.parse(localStorage.getItem(STORE)||'{}');
    const normalized=normalizeEvents(raw);
    evs=normalized.events;
    if(JSON.stringify(raw)!==JSON.stringify(evs)) save();
  }catch(e){
    evs={};
  }
}
function save(){ localStorage.setItem(STORE, JSON.stringify(evs)); }

/* ── Date helpers ── */
function monday(offset){
  const t=new Date(), dow=t.getDay(), d=dow===0?-6:1-dow, m=new Date(t);
  m.setDate(t.getDate()+d+offset*7); m.setHours(0,0,0,0); return m;
}
function fmt(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function isToday(d){ return d.toDateString()===new Date().toDateString(); }
function makeKey(week,day,startMin){ return `${week}|${day}|${startMin}`; }
function eKey(d,startMin){ return makeKey(wk,d,startMin); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clamp(n,min,max){ return Math.min(max,Math.max(min,n)); }
function snapMinute(n){ return Math.round(n/SLOT_MIN)*SLOT_MIN; }
function minToTime(min){
  const h=Math.floor(min/60), m=min%60;
  return `${h}:${String(m).padStart(2,'0')}`;
}
function durationLabel(start,end){
  const total=Math.max(SLOT_MIN,end-start), h=Math.floor(total/60), m=total%60;
  if(h&&m) return `${h}時間${m}分`;
  if(h) return `${h}時間`;
  return `${m}分`;
}
function normalizePriority(value){
  return PRIORITY_ORDER.includes(value)?value:'normal';
}
function parseEventKey(key){
  const parts=String(key).split('|');
  if(parts.length!==3) return null;
  const week=Number(parts[0]), day=Number(parts[1]), rawSlot=Number(parts[2]);
  if(!Number.isInteger(week)||Math.abs(week)>10000) return null;
  if(!Number.isInteger(day)||day<0||day>6) return null;
  if(!Number.isInteger(rawSlot)) return null;
  const startMin=rawSlot<60?rawSlot*60:rawSlot;
  if(startMin<DAY_START||startMin>=DAY_END||startMin%SLOT_MIN!==0) return null;
  return {week,day,startMin};
}
function normalizeEventData(key,ev){
  const parsed=parseEventKey(key);
  if(!parsed||!ev||typeof ev!=='object'||Array.isArray(ev)) return null;
  const title=typeof ev.title==='string'?ev.title.trim():'';
  const memo=typeof ev.memo==='string'?ev.memo.trim():'';
  if(!title) return null;
  const rawStart=Number.isInteger(ev.startMin)?ev.startMin:parsed.startMin;
  const startMin=clamp(snapMinute(rawStart),DAY_START,DAY_END-SLOT_MIN);
  const rawEnd=Number.isInteger(ev.endMin)?ev.endMin:startMin+60;
  const endMin=clamp(snapMinute(rawEnd),startMin+SLOT_MIN,DAY_END);
  return {
    key: makeKey(parsed.week,parsed.day,startMin),
    value: {
      title: title.slice(0,120),
      memo: memo.slice(0,1000),
      startMin,
      endMin,
      priority: normalizePriority(ev.priority)
    }
  };
}

/* ── Navigation ── */
function changeWeek(n){ wk+=n; render(); }
function goToday(){ wk=0; render(); }

/* ── Sheet ── */
function buildTimeOptions(){
  const start=document.getElementById('sStart');
  const end=document.getElementById('sEnd');
  start.innerHTML='';
  end.innerHTML='';
  for(let min=DAY_START;min<DAY_END;min+=SLOT_MIN){
    const opt=document.createElement('option');
    opt.value=String(min);
    opt.textContent=minToTime(min);
    start.appendChild(opt);
  }
  for(let min=DAY_START+SLOT_MIN;min<=DAY_END;min+=SLOT_MIN){
    const opt=document.createElement('option');
    opt.value=String(min);
    opt.textContent=minToTime(min);
    end.appendChild(opt);
  }
}

function renderPriorityChoices(){
  const box=document.getElementById('sPriority');
  box.innerHTML='';
  PRIORITY_ORDER.forEach(key=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className=`prio-btn ${PRIORITIES[key].cls}${selectedPriority===key?' on':''}`;
    btn.textContent=PRIORITIES[key].label;
    btn.addEventListener('click',()=>{
      selectedPriority=key;
      renderPriorityChoices();
    });
    box.appendChild(btn);
  });
}

function setSheetTimes(startMin,endMin){
  const start=document.getElementById('sStart');
  const end=document.getElementById('sEnd');
  start.value=String(startMin);
  end.value=String(endMin);
  ensureEndAfterStart();
  updateTimeSummary();
}

function ensureEndAfterStart(){
  const start=document.getElementById('sStart');
  const end=document.getElementById('sEnd');
  const startMin=Number(start.value);
  let endMin=Number(end.value);
  if(!Number.isInteger(startMin)) return;
  if(!Number.isInteger(endMin)||endMin<=startMin){
    endMin=Math.min(startMin+60,DAY_END);
    if(endMin<=startMin) endMin=startMin+SLOT_MIN;
    end.value=String(endMin);
  }
  Array.from(end.options).forEach(opt=>{
    opt.disabled=Number(opt.value)<=startMin;
  });
}

function updateTimeSummary(){
  const startMin=Number(document.getElementById('sStart').value);
  const endMin=Number(document.getElementById('sEnd').value);
  if(!Number.isInteger(startMin)||!Number.isInteger(endMin)) return;
  document.getElementById('sTime').textContent=`${minToTime(startMin)} 〜 ${minToTime(endMin)}（${durationLabel(startMin,endMin)}）`;
}

function openSheet(key, dIdx, startMin, date, isEdit){
  curKey=key;
  curDay=dIdx;
  const dn=['月曜日','火曜日','水曜日','木曜日','金曜日','土曜日','日曜日'];
  document.getElementById('sDay').textContent=`${fmt(date)} (${dn[dIdx]})`;
  const ev=key?evs[key]:null;
  const safeStart=clamp(snapMinute(ev?.startMin??startMin),DAY_START,DAY_END-SLOT_MIN);
  const safeEnd=clamp(snapMinute(ev?.endMin??safeStart+60),safeStart+SLOT_MIN,DAY_END);
  setSheetTimes(safeStart,safeEnd);
  selectedPriority=normalizePriority(ev?.priority);
  renderPriorityChoices();
  document.getElementById('sTitle').value=ev?.title||'';
  document.getElementById('sMemo').value=ev?.memo||'';
  document.getElementById('sDel').style.display=isEdit?'':'none';
  document.getElementById('ov').classList.add('on');
  setTimeout(()=>document.getElementById('sTitle').focus(), 80);
}

function saveEv(){
  const t=document.getElementById('sTitle').value.trim();
  if(!t){
    const inp=document.getElementById('sTitle');
    inp.style.borderColor='#DC2626';
    setTimeout(()=>inp.style.borderColor='',1200);
    inp.focus(); return;
  }
  const startMin=Number(document.getElementById('sStart').value);
  const endMin=Number(document.getElementById('sEnd').value);
  if(!Number.isInteger(startMin)||!Number.isInteger(endMin)||endMin<=startMin){
    document.getElementById('sEnd').focus();
    return;
  }
  const newKey=eKey(curDay,startMin);
  if(newKey!==curKey&&evs[newKey]&&!confirm('同じ開始時刻に予定があります。上書きしますか？')) return;
  if(curKey&&curKey!==newKey) delete evs[curKey];
  evs[newKey]={
    title:t,
    memo:document.getElementById('sMemo').value.trim(),
    startMin,
    endMin,
    priority:selectedPriority
  };
  curKey=newKey;
  save(); closeSheet(); render();
}

function delEv(){ if(curKey) delete evs[curKey]; save(); closeSheet(); render(); }

function closeSheet(){
  document.getElementById('ov').classList.remove('on');
  curKey=null;
  // blur to dismiss keyboard
  document.getElementById('sTitle').blur();
  document.getElementById('sMemo').blur();
  document.getElementById('sStart').blur();
  document.getElementById('sEnd').blur();
}

/* Close on overlay tap */
document.getElementById('ov').addEventListener('click', e=>{
  if(e.target===document.getElementById('ov')) closeSheet();
});

/* Enter key saves */
document.getElementById('sTitle').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); saveEv(); }
});
document.getElementById('sStart').addEventListener('change', ()=>{
  ensureEndAfterStart();
  updateTimeSummary();
});
document.getElementById('sEnd').addEventListener('change', updateTimeSummary);

/* ── Backup ── */
function countEvents(src=evs){
  return Object.values(src||{}).filter(ev=>ev&&typeof ev.title==='string'&&ev.title.trim()).length;
}

function cloneEvents(src){
  return JSON.parse(JSON.stringify(src||{}));
}

function localStamp(){
  const d=new Date(), pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}

function makeBackup(reason='manual'){
  return {
    kind: BACKUP_KIND,
    version: 2,
    app: '週間タイムブロッカー',
    storageKey: STORE,
    reason,
    exportedAt: new Date().toISOString(),
    exportedAtLocal: new Date().toLocaleString('ja-JP'),
    currentWeekOffset: wk,
    eventCount: countEvents(),
    events: cloneEvents(evs)
  };
}

function downloadJson(data, filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=filename;
  link.style.display='none';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function exportBackup(reason='manual'){
  const prefix=reason==='pre-import'?'tblocker-mobile-safety-backup':'tblocker-mobile-backup';
  downloadJson(makeBackup(reason),`${prefix}_${localStamp()}.json`);
  setBackupStatus(`${countEvents()}件のバックアップを書き出しました。`,'ok');
}

function openBackupSheet(){
  refreshBackupSummary();
  resetPendingImport(false);
  document.getElementById('backupOv').classList.add('on');
}

function closeBackupSheet(){
  document.getElementById('backupOv').classList.remove('on');
}

function refreshBackupSummary(){
  document.getElementById('bSummary').textContent=`現在の予定: ${countEvents()}件`;
}

function setBackupStatus(msg,tone=''){
  const el=document.getElementById('bStatus');
  el.className=`b-status ${tone}`.trim();
  el.textContent=msg||'';
}

function resetPendingImport(keepStatus){
  pendingImport=null;
  document.getElementById('bReview').classList.remove('on');
  document.getElementById('bFile').value='';
  if(!keepStatus) setBackupStatus('');
}

function chooseBackupFile(){
  resetPendingImport(false);
  document.getElementById('bFile').click();
}

async function handleImportFile(file){
  if(!file) return;
  if(file.size>1024*1024){
    setBackupStatus('1MB以下のJSONバックアップを選んでください。','err');
    return;
  }

  try{
    const text=await file.text();
    const parsed=JSON.parse(text);
    pendingImport=parseBackup(parsed);
    showImportReview(file.name,pendingImport);
  }catch(e){
    setBackupStatus(e&&e.message?e.message:'バックアップを読み込めませんでした。','err');
  }
}

function parseBackup(data){
  if(!data||typeof data!=='object'||Array.isArray(data)){
    throw new Error('JSONバックアップの形式が正しくありません。');
  }

  let raw=data, source='旧形式JSON', exportedAt='不明';
  if(data.events&&typeof data.events==='object'&&!Array.isArray(data.events)){
    raw=data.events;
    source=data.kind===BACKUP_KIND?'公式バックアップ':'events形式JSON';
    exportedAt=data.exportedAtLocal||formatIsoDate(data.exportedAt)||'不明';
  }

  const normalized=normalizeEvents(raw);
  if(!normalized.count){
    throw new Error('取り込める予定が見つかりませんでした。');
  }

  return {
    events: normalized.events,
    count: normalized.count,
    skipped: normalized.skipped,
    source,
    exportedAt
  };
}

function formatIsoDate(value){
  if(!value) return '';
  const d=new Date(value);
  return Number.isNaN(d.getTime())?'':d.toLocaleString('ja-JP');
}

function normalizeEvents(raw){
  const out={};
  let skipped=0;
  const keys=Object.keys(raw||{});
  if(keys.length>5000) throw new Error('予定が多すぎます。5000件以下のバックアップを使ってください。');

  keys.forEach(key=>{
    const normalized=normalizeEventData(key,raw[key]);
    if(!normalized){
      skipped++;
      return;
    }
    out[normalized.key]=normalized.value;
  });

  return {events:out, count:Object.keys(out).length, skipped};
}

function isValidEventKey(key){
  return !!parseEventKey(key);
}

function showImportReview(name,data){
  const overlap=Object.keys(data.events).filter(key=>evs[key]).length;
  document.getElementById('bFileName').textContent=name;
  document.getElementById('bCount').textContent=`${data.count}件`;
  document.getElementById('bOverlap').textContent=overlap?`${overlap}件を上書き`:'なし';
  document.getElementById('bExportedAt').textContent=data.exportedAt;
  document.getElementById('bSource').textContent=data.skipped?`${data.source} / ${data.skipped}件除外`:data.source;
  document.getElementById('bReview').classList.add('on');
  setBackupStatus('内容を確認して取り込み方法を選んでください。','warn');
}

function applyPendingImport(mode){
  if(!pendingImport){
    setBackupStatus('先にバックアップファイルを選んでください。','err');
    return;
  }

  const importedCount=pendingImport.count;
  if(mode==='replace'){
    const ok=confirm('現在の予定をすべて置き換えます。先に現在の予定をバックアップとして保存します。続けますか？');
    if(!ok) return;
    exportBackup('pre-import');
    evs=cloneEvents(pendingImport.events);
  }else{
    const overlap=Object.keys(pendingImport.events).filter(key=>evs[key]).length;
    const ok=confirm(`${pendingImport.count}件を追加します。${overlap}件の同じ枠は上書きされます。先に現在の予定をバックアップとして保存します。続けますか？`);
    if(!ok) return;
    exportBackup('pre-import');
    evs=Object.assign({},evs,pendingImport.events);
  }

  save();
  render();
  refreshBackupSummary();
  const done=mode==='replace'?'置き換え':'追加/上書き';
  resetPendingImport(true);
  setBackupStatus(`${importedCount}件を${done}しました。`,'ok');
}

document.getElementById('backupOv').addEventListener('click', e=>{
  if(e.target===document.getElementById('backupOv')) closeBackupSheet();
});

/* ── Render ── */
function render(){
  const m=monday(wk);
  const s=new Date(m); s.setDate(m.getDate()+6);
  const mm=m.getMonth()+1, sm=s.getMonth()+1;
  document.getElementById('wlbl').textContent=
    mm===sm
      ? `${mm}月${m.getDate()}〜${s.getDate()}日`
      : `${mm}/${m.getDate()} 〜 ${sm}/${s.getDate()}`;

  const g=document.getElementById('grid');
  g.innerHTML='';
  const weekEvents=Object.entries(evs)
    .map(([key,ev])=>({key,ev,meta:parseEventKey(key)}))
    .filter(item=>item.meta&&item.meta.week===wk)
    .sort((a,b)=>a.meta.day-b.meta.day||a.ev.startMin-b.ev.startMin||a.ev.endMin-b.ev.endMin);

  // Corner
  const co=document.createElement('div'); co.className='dh-corner'; g.appendChild(co);

  // Day headers
  for(let d=0;d<7;d++){
    const dt=new Date(m); dt.setDate(m.getDate()+d);
    const c=document.createElement('div'); c.className='dh';
    if(isToday(dt)) c.classList.add('today');
    if(d===5) c.classList.add('sat');
    if(d===6) c.classList.add('sun');
    c.innerHTML=`<div class="dname">${DJP[d]}</div><div class="dnum">${dt.getDate()}</div>`;
    g.appendChild(c);
  }

  // Hour rows
  HOURS.forEach(h=>{
    const hourStart=h*60;
    const tl=document.createElement('div'); tl.className='tlbl';
    tl.textContent=`${h}:00`; g.appendChild(tl);

    for(let d=0;d<7;d++){
      const dt=new Date(m); dt.setDate(m.getDate()+d);
      const cell=document.createElement('div'); cell.className='cell';
      if(d===5) cell.classList.add('sat');
      if(d===6) cell.classList.add('sun');
      cell.addEventListener('click',()=>openSheet(null,d,hourStart,dt,false));

      weekEvents
        .filter(item=>item.meta.day===d&&item.ev.startMin>=hourStart&&item.ev.startMin<hourStart+60)
        .forEach(item=>{
        const {key,ev}=item;
        const priority=normalizePriority(ev.priority);
        const duration=Math.max(SLOT_MIN,ev.endMin-ev.startMin);
        const top=3+((ev.startMin-hourStart)/60)*CELL_H;
        const height=Math.max(26,(duration/60)*CELL_H-6);
        cell.classList.add('has-ev');
        const bl=document.createElement('div'); bl.className='ev';
        bl.classList.add(PRIORITIES[priority].cls);
        if(duration<45) bl.classList.add('compact');
        bl.style.top=`${top}px`;
        bl.style.height=`${height}px`;
        bl.innerHTML=`<div class="ev-time">${minToTime(ev.startMin)}〜${minToTime(ev.endMin)} / ${PRIORITIES[priority].label}</div><div class="ev-title">${esc(ev.title)}</div>${ev.memo?`<div class="ev-memo">${esc(ev.memo)}</div>`:''}`;
        bl.addEventListener('click',e=>{
          e.stopPropagation();
          openSheet(key,d,ev.startMin,dt,true);
        });
        cell.appendChild(bl);
      });
      g.appendChild(cell);
    }
  });
}

function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  if(!['http:','https:'].includes(location.protocol)) return;
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js', {scope:'./'})
      .then(()=>navigator.serviceWorker.ready)
      .then(()=>{ document.documentElement.dataset.offlineReady='true'; })
      .catch(()=>{ document.documentElement.dataset.offlineReady='false'; });
  });
}

buildTimeOptions();
load(); render();
registerServiceWorker();
</script>
