<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="毎週の予定をスマートに組み立てるモバイルタイムブロッカー">
  <meta name="theme-color" content="#111018">
  <meta name="color-scheme" content="light">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WEEK FLOW">
  <title>WEEK FLOW｜週間タイムブロッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --ink: #111018;
      --ink-2: #262431;
      --muted: #777382;
      --muted-2: #a9a5b1;
      --line: #e8e5ec;
      --paper: #f6f4f8;
      --card: #ffffff;
      --violet: #7657ff;
      --violet-dark: #5d3df2;
      --violet-soft: #eeeaff;
      --lime: #d9ff66;
      --danger: #ed4967;
      --danger-soft: #fff0f3;
      --amber: #f59e42;
      --amber-soft: #fff4e7;
      --teal: #18a58f;
      --teal-soft: #e7faf6;
      --hour-h: 72px;
      --rail-w: 54px;
      --radius: 22px;
      --shadow: 0 14px 36px rgba(27, 22, 45, .10);
    }

    html { min-height: 100%; background: var(--paper); }
    body {
      min-height: 100%;
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 88% 4%, rgba(118,87,255,.13), transparent 22rem),
        var(--paper);
      overscroll-behavior-y: contain;
    }
    button, input, textarea, select { font: inherit; }
    button { color: inherit; }
    button, [role="button"] { touch-action: manipulation; }

    /* App header */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 200;
      padding: calc(10px + env(safe-area-inset-top)) 16px 12px;
      color: #fff;
      background: rgba(17,16,24,.96);
      box-shadow: 0 8px 30px rgba(17,16,24,.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .topline, .week-nav { display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 11px;
      color: var(--ink);
      background: var(--lime);
      box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset;
    }
    .brand-mark svg { width: 18px; height: 18px; }
    .brand-copy { line-height: 1; }
    .brand-name { font-size: 15px; font-weight: 900; letter-spacing: .12em; }
    .brand-sub { display: block; margin-top: 5px; color: #aaa6b7; font-size: 9px; letter-spacing: .16em; }
    .icon-btn {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      color: #fff;
      background: rgba(255,255,255,.06);
      cursor: pointer;
    }
    .icon-btn:active { transform: scale(.96); background: rgba(255,255,255,.12); }
    .icon-btn svg { width: 20px; height: 20px; }
    .week-nav { margin-top: 12px; }
    .week-move {
      width: 44px;
      height: 40px;
      border: 0;
      border-radius: 13px;
      color: #d7d4de;
      background: transparent;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
    }
    .week-move:active { background: rgba(255,255,255,.08); }
    .week-title { text-align: center; }
    .week-title strong { display: block; font-size: 15px; letter-spacing: .01em; }
    .week-title button {
      min-height: 26px;
      margin-top: 2px;
      padding: 2px 10px;
      border: 0;
      border-radius: 999px;
      color: var(--lime);
      background: transparent;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
    }
    .week-title button:active { background: rgba(217,255,102,.1); }

    .day-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 5px;
      max-width: 760px;
      margin: 10px auto 0;
    }
    .day-btn {
      min-width: 0;
      min-height: 56px;
      padding: 6px 2px;
      border: 1px solid transparent;
      border-radius: 15px;
      color: #918d9d;
      background: transparent;
      cursor: pointer;
    }
    .day-btn .dow { display: block; font-size: 10px; font-weight: 800; }
    .day-btn .dnum { display: block; margin-top: 4px; font-size: 18px; font-weight: 850; line-height: 1; }
    .day-btn.today:not(.selected) { color: var(--lime); border-color: rgba(217,255,102,.28); }
    .day-btn.selected {
      color: var(--ink);
      background: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,.22);
    }
    .day-btn.selected.today { background: var(--lime); }

    /* Main */
    .main { width: min(100%, 760px); margin: 0 auto; padding: 18px 14px calc(110px + env(safe-area-inset-bottom)); }
    .day-hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 6px 4px 18px;
    }
    .eyebrow { color: var(--violet); font-size: 11px; font-weight: 900; letter-spacing: .12em; }
    .day-heading { margin-top: 5px; font-size: clamp(24px, 7vw, 32px); font-weight: 900; letter-spacing: -.045em; line-height: 1.15; }
    .day-heading span { color: var(--muted-2); font-weight: 700; }
    .day-stats { display: flex; gap: 7px; padding-top: 2px; flex: 0 0 auto; }
    .stat {
      min-width: 58px;
      padding: 9px 8px;
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 15px;
      text-align: center;
      background: rgba(255,255,255,.68);
      box-shadow: 0 7px 20px rgba(38,36,49,.05);
    }
    .stat strong { display: block; font-size: 15px; }
    .stat span { display: block; margin-top: 2px; color: var(--muted); font-size: 9px; font-weight: 700; }

    .empty-banner {
      display: none;
      align-items: center;
      gap: 11px;
      margin-bottom: 12px;
      padding: 13px 15px;
      border: 1px solid #e6e0ff;
      border-radius: 16px;
      color: #5a4a8d;
      background: rgba(238,234,255,.78);
      font-size: 12px;
      font-weight: 700;
    }
    .empty-banner.on { display: flex; }
    .empty-banner span:first-child { font-size: 18px; }

    .timeline-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.9);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .timeline-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: #fcfbfd;
    }
    .timeline-head strong { font-size: 12px; letter-spacing: .08em; }
    .timeline-head span { color: var(--muted); font-size: 10px; }
    .timeline {
      position: relative;
      height: calc(var(--hour-h) * 18);
      margin-left: var(--rail-w);
      cursor: crosshair;
      background-color: #fff;
      background-image:
        linear-gradient(to bottom, transparent calc(25% - 1px), #f2eff5 calc(25% - 1px), #f2eff5 25%, transparent 25%, transparent calc(50% - 1px), #f2eff5 calc(50% - 1px), #f2eff5 50%, transparent 50%, transparent calc(75% - 1px), #f2eff5 calc(75% - 1px), #f2eff5 75%, transparent 75%),
        repeating-linear-gradient(to bottom, transparent 0, transparent calc(var(--hour-h) - 1px), var(--line) calc(var(--hour-h) - 1px), var(--line) var(--hour-h));
      background-size: 100% var(--hour-h), 100% var(--hour-h);
    }
    .time-rail { position: absolute; inset: 48px auto 0 0; width: var(--rail-w); pointer-events: none; }
    .time-label {
      position: absolute;
      right: 9px;
      width: 40px;
      transform: translateY(-7px);
      color: var(--muted-2);
      text-align: right;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }
    .time-label:first-child { transform: translateY(8px); }
    .event-layer { position: absolute; inset: 0; pointer-events: none; }
    .event {
      --ev-color: var(--violet);
      --ev-bg: var(--violet-soft);
      position: absolute;
      z-index: 4;
      min-height: 34px;
      padding: 8px 9px 7px 12px;
      overflow: hidden;
      border: 0;
      border-left: 4px solid var(--ev-color);
      border-radius: 10px;
      color: var(--ink-2);
      text-align: left;
      background: var(--ev-bg);
      box-shadow: 0 5px 14px rgba(27,22,45,.10);
      cursor: pointer;
      pointer-events: auto;
    }
    .event:active { transform: scale(.985); filter: brightness(.98); }
    .event.p-urgent { --ev-color: var(--danger); --ev-bg: var(--danger-soft); }
    .event.p-high { --ev-color: var(--amber); --ev-bg: var(--amber-soft); }
    .event.p-low { --ev-color: var(--teal); --ev-bg: var(--teal-soft); }
    .event.overlap { outline: 2px solid var(--danger); outline-offset: -2px; }
    .ev-time { display: block; color: var(--ev-color); font-size: 9px; font-weight: 900; letter-spacing: .03em; white-space: nowrap; }
    .ev-title { display: block; margin-top: 2px; overflow: hidden; font-size: 12px; font-weight: 850; line-height: 1.25; text-overflow: ellipsis; white-space: nowrap; }
    .ev-memo { display: block; margin-top: 3px; overflow: hidden; color: var(--muted); font-size: 9px; text-overflow: ellipsis; white-space: nowrap; }
    .event.compact { padding-top: 5px; padding-bottom: 4px; }
    .event.compact .ev-memo { display: none; }
    .event.tiny .ev-time, .event.tiny .ev-memo { display: none; }
    .event.tiny .ev-title { margin-top: 0; font-size: 10px; }
    .now-line {
      position: absolute;
      z-index: 8;
      left: -5px;
      right: 0;
      height: 2px;
      background: var(--danger);
      pointer-events: none;
    }
    .now-line::before {
      content: "";
      position: absolute;
      left: -4px;
      top: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(237,73,103,.13);
    }

    .fab {
      position: fixed;
      z-index: 180;
      right: max(18px, calc((100vw - 760px) / 2 + 18px));
      bottom: calc(20px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 56px;
      padding: 0 20px 0 15px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      background: var(--violet);
      box-shadow: 0 14px 32px rgba(93,61,242,.34);
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
    }
    .fab:active { transform: translateY(2px); background: var(--violet-dark); }
    .fab-plus { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 10px; color: var(--ink); background: var(--lime); font-size: 24px; font-weight: 500; }

    /* Bottom sheets */
    .sheet-overlay {
      display: none;
      position: fixed;
      z-index: 500;
      inset: 0;
      align-items: flex-end;
      justify-content: center;
      padding-top: env(safe-area-inset-top);
      background: rgba(17,16,24,.58);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .sheet-overlay.on { display: flex; }
    .sheet {
      width: min(100%, 600px);
      max-height: 94dvh;
      overflow-y: auto;
      border-radius: 28px 28px 0 0;
      background: #fff;
      box-shadow: 0 -20px 50px rgba(0,0,0,.22);
      animation: sheetUp .25s cubic-bezier(.2,.8,.2,1);
      overscroll-behavior: contain;
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @media (min-width: 680px) {
      .sheet-overlay { align-items: center; padding: 24px; }
      .sheet { border-radius: 28px; max-height: min(860px, 92dvh); }
    }
    .sheet-handle { width: 42px; height: 5px; margin: 10px auto 4px; border-radius: 999px; background: #dedbe3; }
    .sheet-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; border-bottom: 1px solid var(--line); }
    .sheet-top-copy small { display: block; color: var(--violet); font-size: 10px; font-weight: 900; letter-spacing: .12em; }
    .sheet-top-copy strong { display: block; margin-top: 3px; font-size: 20px; letter-spacing: -.03em; }
    .sheet-close {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 14px;
      color: var(--muted);
      background: var(--paper);
      font-size: 24px;
      cursor: pointer;
    }
    .sheet-body { padding: 18px 18px calc(24px + env(safe-area-inset-bottom)); }
    .field { margin-bottom: 17px; }
    .field-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; color: var(--ink-2); font-size: 11px; font-weight: 850; letter-spacing: .06em; }
    .field-label span { color: var(--muted-2); font-size: 9px; font-weight: 700; }
    .input, .textarea, .select {
      width: 100%;
      min-height: 50px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      outline: none;
      color: var(--ink);
      background: #fbfafc;
      font-size: 15px;
      -webkit-appearance: none;
      appearance: none;
    }
    .input, .textarea { padding: 13px 14px; }
    .select { padding: 0 38px 0 14px; background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position: calc(100% - 18px) 21px, calc(100% - 13px) 21px; background-size: 5px 5px; background-repeat: no-repeat; }
    .textarea { min-height: 78px; resize: vertical; }
    .input:focus, .textarea:focus, .select:focus { border-color: var(--violet); box-shadow: 0 0 0 4px rgba(118,87,255,.11); background: #fff; }
    .time-row { display: grid; grid-template-columns: 1fr 18px 1fr; align-items: end; gap: 8px; }
    .time-dash { padding-bottom: 16px; color: var(--muted-2); text-align: center; }
    .duration-pills { display: flex; gap: 7px; margin-top: 9px; overflow-x: auto; scrollbar-width: none; }
    .duration-pills::-webkit-scrollbar { display: none; }
    .quick-btn {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #fff;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
    }
    .quick-btn:active { color: var(--violet); border-color: var(--violet); background: var(--violet-soft); }
    .prio-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 7px; }
    .prio-btn {
      min-height: 44px;
      border: 1.5px solid var(--line);
      border-radius: 13px;
      color: var(--muted);
      background: #fff;
      font-size: 11px;
      font-weight: 850;
      cursor: pointer;
    }
    .prio-btn::before { content: ""; display: inline-block; width: 7px; height: 7px; margin-right: 5px; border-radius: 50%; vertical-align: 1px; background: var(--violet); }
    .prio-btn.p-urgent::before { background: var(--danger); }
    .prio-btn.p-high::before { background: var(--amber); }
    .prio-btn.p-low::before { background: var(--teal); }
    .prio-btn.on { color: var(--violet-dark); border-color: var(--violet); background: var(--violet-soft); }
    .prio-btn.on.p-urgent { color: var(--danger); border-color: var(--danger); background: var(--danger-soft); }
    .prio-btn.on.p-high { color: #b66516; border-color: var(--amber); background: var(--amber-soft); }
    .prio-btn.on.p-low { color: var(--teal); border-color: var(--teal); background: var(--teal-soft); }
    .form-error {
      display: none;
      margin: 2px 0 14px;
      padding: 12px;
      border: 1px solid #ffd1da;
      border-radius: 14px;
      color: #ad2e46;
      background: var(--danger-soft);
      font-size: 12px;
      line-height: 1.55;
    }
    .form-error.on { display: block; }
    .time-input {
      padding: 0 14px;
      font-variant-numeric: tabular-nums;
      color-scheme: light;
    }
    .time-input::-webkit-calendar-picker-indicator { opacity: .55; }
    .actions { display: grid; gap: 9px; }
    .save-btn, .delete-btn, .secondary-btn, .danger-btn {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 15px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }
    .save-btn { color: #fff; background: var(--violet); box-shadow: 0 9px 22px rgba(93,61,242,.22); }
    .save-btn:active { background: var(--violet-dark); }
    .delete-btn, .danger-btn { color: var(--danger); background: var(--danger-soft); }
    .secondary-btn { color: var(--ink-2); border: 1px solid var(--line); background: var(--paper); }

    /* Backup */
    .backup-intro { display: flex; gap: 12px; align-items: center; padding: 14px; margin-bottom: 18px; border-radius: 16px; color: #554878; background: var(--violet-soft); }
    .backup-intro svg { width: 25px; flex: 0 0 auto; }
    .backup-intro strong { display: block; font-size: 13px; }
    .backup-intro span { display: block; margin-top: 3px; font-size: 11px; line-height: 1.45; }
    .b-actions { display: grid; gap: 9px; }
    .b-review { display: none; margin-top: 16px; padding: 14px; border: 1px solid var(--line); border-radius: 16px; background: #fbfafc; }
    .b-review.on { display: block; }
    .b-review-title { margin-bottom: 10px; font-size: 13px; font-weight: 900; }
    .b-list { display: grid; gap: 8px; margin-bottom: 13px; }
    .b-row { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 11px; }
    .b-row strong { max-width: 66%; overflow: hidden; color: var(--ink-2); text-align: right; text-overflow: ellipsis; white-space: nowrap; }
    .b-status { min-height: 20px; margin-top: 12px; color: var(--muted); font-size: 11px; line-height: 1.5; }
    .b-status.ok { color: var(--teal); }
    .b-status.warn { color: #b66516; }
    .b-status.err { color: var(--danger); }

    .toast {
      position: fixed;
      z-index: 900;
      left: 50%;
      bottom: calc(88px + env(safe-area-inset-bottom));
      max-width: calc(100vw - 32px);
      padding: 11px 15px;
      border-radius: 12px;
      color: #fff;
      background: var(--ink);
      box-shadow: 0 10px 28px rgba(0,0,0,.25);
      font-size: 12px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: .2s ease;
    }
    .toast.on { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 390px) {
      :root { --hour-h: 68px; }
      .app-header { padding-left: 11px; padding-right: 11px; }
      .day-strip { gap: 2px; }
      .day-btn { border-radius: 13px; }
      .day-btn .dnum { font-size: 17px; }
      .main { padding-left: 9px; padding-right: 9px; }
      .day-stats { gap: 4px; }
      .stat { min-width: 53px; padding-left: 5px; padding-right: 5px; }
      .event { padding-left: 8px; padding-right: 5px; }
      .prio-btn { font-size: 10px; }
    }

    @media print {
      .app-header, .fab, .empty-banner { display: none !important; }
      .main { padding: 0; }
      .timeline-card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="topline">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 6.5h16M7 3.5v6M17 3.5v6M5.5 5h13A1.5 1.5 0 0 1 20 6.5v12a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18.5v-12A1.5 1.5 0 0 1 5.5 5Z"/><path d="m8 14 2.2 2.2L16 10.5"/></svg>
        </div>
        <div class="brand-copy">
          <div class="brand-name">WEEK FLOW</div>
          <span class="brand-sub">TIME BLOCKER</span>
        </div>
      </div>
      <button class="icon-btn" type="button" onclick="openBackupSheet()" aria-label="バックアップを開く">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
      </button>
    </div>
    <div class="week-nav">
      <button class="week-move" type="button" onclick="changeWeek(-1)" aria-label="前の週">‹</button>
      <div class="week-title">
        <strong id="weekLabel"></strong>
        <button type="button" onclick="goToday()" id="todayBtn">今日に戻る</button>
      </div>
      <button class="week-move" type="button" onclick="changeWeek(1)" aria-label="次の週">›</button>
    </div>
    <nav class="day-strip" id="dayStrip" aria-label="曜日を選択"></nav>
  </header>

  <main class="main">
    <section class="day-hero" aria-labelledby="dayHeading">
      <div>
        <div class="eyebrow" id="dayEyebrow"></div>
        <h1 class="day-heading" id="dayHeading"></h1>
      </div>
      <div class="day-stats" aria-label="この日の予定サマリー">
        <div class="stat"><strong id="eventCount">0</strong><span>予定</span></div>
        <div class="stat"><strong id="plannedTime">0h</strong><span>予定時間</span></div>
      </div>
    </section>

    <div class="empty-banner" id="emptyBanner">
      <span aria-hidden="true">✦</span>
      <span>まだ予定はありません。空いている時間をタップして追加できます。</span>
    </div>

    <section class="timeline-card" aria-label="1日のタイムライン">
      <div class="timeline-head"><strong>DAY TIMELINE</strong><span>タップして予定を追加</span></div>
      <div class="time-rail" id="timeRail" aria-hidden="true"></div>
      <div class="timeline" id="timeline">
        <div class="event-layer" id="eventLayer"></div>
      </div>
    </section>
  </main>

  <button class="fab" type="button" onclick="openQuickAdd()">
    <span class="fab-plus" aria-hidden="true">+</span>
    <span>予定を追加</span>
  </button>

  <!-- Schedule editor -->
  <div class="sheet-overlay" id="eventOverlay" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-top">
        <div class="sheet-top-copy"><small id="sheetMode">NEW BLOCK</small><strong id="sheetTitle">予定を追加</strong></div>
        <button class="sheet-close" type="button" onclick="closeEventSheet()" aria-label="閉じる">×</button>
      </div>
      <div class="sheet-body">
        <div class="field">
          <label class="field-label" for="eventTitle">タイトル <span>必須</span></label>
          <input class="input" id="eventTitle" maxlength="120" placeholder="例：ジム、レポート、ミーティング" enterkeyhint="next" autocomplete="off">
        </div>
        <div class="field">
          <div class="time-row">
            <div>
              <label class="field-label" for="startTime">開始</label>
              <input class="input time-input" id="startTime" type="time" min="06:00" max="23:59" step="60">
            </div>
            <div class="time-dash">—</div>
            <div>
              <label class="field-label" for="endTime">終了</label>
              <input class="input time-input" id="endTime" type="time" step="60">
            </div>
          </div>
          <div class="duration-pills" aria-label="所要時間を選択">
            <button class="quick-btn" type="button" onclick="setDuration(30)">30分</button>
            <button class="quick-btn" type="button" onclick="setDuration(60)">1時間</button>
            <button class="quick-btn" type="button" onclick="setDuration(90)">1.5時間</button>
            <button class="quick-btn" type="button" onclick="setDuration(120)">2時間</button>
          </div>
        </div>
        <div class="field">
          <div class="field-label">優先度</div>
          <div class="prio-row" id="priorityRow"></div>
        </div>
        <div class="field">
          <label class="field-label" for="eventMemo">メモ <span>任意</span></label>
          <textarea class="textarea" id="eventMemo" maxlength="1000" placeholder="場所、URL、持ち物など"></textarea>
        </div>
        <div class="form-error" id="formError" role="alert"><span id="formErrorText"></span></div>
        <div class="actions">
          <button class="save-btn" type="button" onclick="saveEvent()">この予定を保存</button>
          <button class="delete-btn" id="deleteBtn" type="button" onclick="deleteEvent()" style="display:none">予定を削除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Backup -->
  <div class="sheet-overlay" id="backupOverlay" role="dialog" aria-modal="true" aria-labelledby="backupTitle">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-top">
        <div class="sheet-top-copy"><small>DATA CARE</small><strong id="backupTitle">バックアップ</strong></div>
        <button class="sheet-close" type="button" onclick="closeBackupSheet()" aria-label="閉じる">×</button>
      </div>
      <div class="sheet-body">
        <div class="backup-intro">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
          <div><strong id="backupSummary">現在の予定: 0件</strong><span>機種変更やデータ消去に備えて、JSONファイルとして保存できます。</span></div>
        </div>
        <div class="b-actions">
          <button class="save-btn" type="button" onclick="exportBackup()">バックアップを書き出す</button>
          <button class="secondary-btn" type="button" onclick="chooseBackupFile()">バックアップを読み込む</button>
        </div>
        <input id="backupFile" type="file" accept=".json,application/json" hidden onchange="handleImportFile(this.files[0])">
        <div class="b-review" id="backupReview">
          <div class="b-review-title">読み込み内容</div>
          <div class="b-list">
            <div class="b-row"><span>ファイル</span><strong id="backupFileName"></strong></div>
            <div class="b-row"><span>予定</span><strong id="backupCount"></strong></div>
            <div class="b-row"><span>同じ予定</span><strong id="backupOverlap"></strong></div>
            <div class="b-row"><span>出力日時</span><strong id="backupExportedAt"></strong></div>
            <div class="b-row"><span>形式</span><strong id="backupSource"></strong></div>
          </div>
          <div class="b-actions">
            <button class="secondary-btn" type="button" onclick="applyPendingImport('merge')">今の予定に追加</button>
            <button class="danger-btn" type="button" onclick="applyPendingImport('replace')">すべて置き換え</button>
          </div>
        </div>
        <div class="b-status" id="backupStatus" role="status"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const DAY_START = 6 * 60;
    const DAY_END = 24 * 60;
    const SLOT_MIN = 1;
    const HOUR_HEIGHT = () => parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hour-h')) || 72;
    const STORE = 'week_flow_v3';
    const LEGACY_STORE = 'tblocker_v2';
    const BACKUP_KIND = 'week-flow-mobile-backup';
    const DAYS = ['月', '火', '水', '木', '金', '土', '日'];
    const DAY_NAMES = ['月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日', '日曜日'];
    const PRIORITY_ORDER = ['urgent', 'high', 'normal', 'low'];
    const PRIORITIES = {
      urgent: { label: '重要', cls: 'p-urgent' },
      high: { label: '高め', cls: 'p-high' },
      normal: { label: 'ふつう', cls: 'p-normal' },
      low: { label: '余裕', cls: 'p-low' }
    };

    let events = {};
    let weekOffset = 0;
    let selectedDay = todayDayIndex();
    let editingKey = null;
    let editingDate = '';
    let selectedPriority = 'normal';
    let pendingImport = null;
    let toastTimer = null;

    /* Utilities */
    function pad(value) { return String(value).padStart(2, '0'); }
    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
    function snapMinute(value) { return Math.round(value / SLOT_MIN) * SLOT_MIN; }
    function esc(value) { return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function toIso(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function fromIso(iso) {
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(iso));
      if (!match) return null;
      const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
      return Number.isNaN(date.getTime()) || toIso(date) !== iso ? null : date;
    }
    function addDays(date, days) { const next = new Date(date); next.setDate(next.getDate() + days); return next; }
    function startOfWeek(offset = 0) {
      const now = new Date();
      const day = now.getDay();
      const mondayDistance = day === 0 ? -6 : 1 - day;
      const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      monday.setDate(monday.getDate() + mondayDistance + offset * 7);
      return monday;
    }
    function selectedDate() { return addDays(startOfWeek(weekOffset), selectedDay); }
    function todayDayIndex() { const day = new Date().getDay(); return day === 0 ? 6 : day - 1; }
    function isToday(date) { return toIso(date) === toIso(new Date()); }
    function minToTime(minute) {
      if (minute === 24 * 60) return '24:00';
      return `${pad(Math.floor(minute / 60))}:${pad(minute % 60)}`;
    }
    function minToInput(minute) { return minute === DAY_END ? '00:00' : minToTime(minute); }
    function inputToMinute(value, allowMidnight = false) {
      const match = /^(\d{2}):(\d{2})$/.exec(String(value));
      if (!match) return NaN;
      const hour = Number(match[1]);
      const minute = Number(match[2]);
      if (hour > 23 || minute > 59) return NaN;
      const total = hour * 60 + minute;
      return allowMidnight && total === 0 ? DAY_END : total;
    }
    function durationText(totalMinutes) {
      const minutes = Math.max(0, totalMinutes);
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      if (hours && rest) return `${hours}h${rest}m`;
      if (hours) return `${hours}h`;
      return `${rest}m`;
    }
    function stableId(value) {
      let hash = 2166136261;
      for (let index = 0; index < value.length; index += 1) {
        hash ^= value.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return `m${(hash >>> 0).toString(36)}`;
    }
    function createId() {
      if (globalThis.crypto && typeof globalThis.crypto.randomUUID === 'function') return globalThis.crypto.randomUUID();
      return `e${Date.now().toString(36)}${Math.random().toString(36).slice(2, 9)}`;
    }
    function cleanId(value) { return /^[A-Za-z0-9_-]{1,80}$/.test(String(value || '')) ? String(value) : ''; }
    function makeKey(dateIso, startMin, id) { return `${dateIso}|${startMin}|${cleanId(id) || createId()}`; }
    function normalizePriority(value) { return PRIORITY_ORDER.includes(value) ? value : 'normal'; }
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('on');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('on'), 2200);
    }

    /* Storage and migration */
    function parseEventKey(key) {
      const absolute = /^(\d{4}-\d{2}-\d{2})\|(\d+)(?:\|([A-Za-z0-9_-]{1,80}))?$/.exec(String(key));
      if (absolute) {
        const startMin = Number(absolute[2]);
        if (!fromIso(absolute[1]) || !Number.isInteger(startMin) || startMin < DAY_START || startMin >= DAY_END || startMin % SLOT_MIN) return null;
        return { date: absolute[1], startMin, id: absolute[3] || '', legacy: false };
      }
      const legacy = /^(-?\d+)\|(\d)\|(\d+)$/.exec(String(key));
      if (!legacy) return null;
      const offset = Number(legacy[1]);
      const day = Number(legacy[2]);
      let startMin = Number(legacy[3]);
      if (startMin < 60) startMin *= 60;
      if (!Number.isInteger(offset) || Math.abs(offset) > 10000 || day < 0 || day > 6 || startMin < DAY_START || startMin >= DAY_END || startMin % SLOT_MIN) return null;
      return { date: toIso(addDays(startOfWeek(offset), day)), startMin, id: '', legacy: true };
    }
    function normalizeEvent(key, event) {
      const meta = parseEventKey(key);
      if (!meta || !event || typeof event !== 'object' || Array.isArray(event)) return null;
      const title = typeof event.title === 'string' ? event.title.trim() : '';
      if (!title) return null;
      const memo = typeof event.memo === 'string' ? event.memo.trim() : '';
      const rawStart = Number.isInteger(event.startMin) ? event.startMin : meta.startMin;
      const startMin = clamp(snapMinute(rawStart), DAY_START, DAY_END - SLOT_MIN);
      const rawEnd = Number.isInteger(event.endMin) ? event.endMin : startMin + 60;
      const endMin = clamp(snapMinute(rawEnd), startMin + SLOT_MIN, DAY_END);
      const id = cleanId(meta.id) || cleanId(event.id) || stableId(`${meta.date}|${startMin}|${title}`);
      return {
        key: makeKey(meta.date, startMin, id),
        value: { id, title: title.slice(0, 120), memo: memo.slice(0, 1000), startMin, endMin, priority: normalizePriority(event.priority) },
        legacy: meta.legacy || !meta.id || event.id !== id
      };
    }
    function normalizeEvents(raw) {
      const output = {};
      let skipped = 0;
      let migrated = 0;
      const keys = Object.keys(raw || {});
      if (keys.length > 5000) throw new Error('予定が多すぎます。5000件以下のバックアップを使ってください。');
      keys.forEach(key => {
        const normalized = normalizeEvent(key, raw[key]);
        if (!normalized) { skipped += 1; return; }
        output[normalized.key] = normalized.value;
        if (normalized.legacy) migrated += 1;
      });
      return { events: output, count: Object.keys(output).length, skipped, migrated };
    }
    function loadEvents() {
      try {
        const current = localStorage.getItem(STORE);
        const legacy = localStorage.getItem(LEGACY_STORE);
        const raw = JSON.parse(current || legacy || '{}');
        const normalized = normalizeEvents(raw);
        events = normalized.events;
        if (!current || normalized.skipped || normalized.migrated) persistEvents();
        if (!current && legacy && normalized.count) setTimeout(() => showToast(`${normalized.count}件の予定を新しい形式へ移行しました`), 500);
      } catch (error) {
        events = {};
      }
    }
    function persistEvents() { localStorage.setItem(STORE, JSON.stringify(events)); }

    /* Navigation */
    function changeWeek(delta) { weekOffset += delta; render(); scrollPageToTop(); }
    function goToday() { weekOffset = 0; selectedDay = todayDayIndex(); render(); scrollToRelevantTime(); }
    function selectDay(day) { selectedDay = day; render(); scrollPageToTop(); }
    function scrollPageToTop() { requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'smooth' })); }

    /* Event editor */
    function renderPriorities() {
      const row = document.getElementById('priorityRow');
      row.innerHTML = '';
      PRIORITY_ORDER.forEach(key => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `prio-btn ${PRIORITIES[key].cls}${selectedPriority === key ? ' on' : ''}`;
        button.textContent = PRIORITIES[key].label;
        button.addEventListener('click', () => { selectedPriority = key; renderPriorities(); });
        row.appendChild(button);
      });
    }
    function openEventSheet(key, dateIso, startMin) {
      editingKey = key || null;
      editingDate = dateIso;
      const event = key ? events[key] : null;
      const start = clamp(snapMinute(event ? event.startMin : startMin), DAY_START, DAY_END - SLOT_MIN);
      const end = clamp(event ? event.endMin : start + 60, start + SLOT_MIN, DAY_END);
      const date = fromIso(dateIso);
      selectedPriority = normalizePriority(event && event.priority);
      document.getElementById('sheetMode').textContent = event ? 'EDIT BLOCK' : 'NEW BLOCK';
      document.getElementById('sheetTitle').textContent = `${date.getMonth() + 1}月${date.getDate()}日 ${DAY_NAMES[(date.getDay() + 6) % 7]}`;
      document.getElementById('eventTitle').value = event ? event.title : '';
      document.getElementById('eventMemo').value = event ? event.memo : '';
      document.getElementById('startTime').value = minToInput(start);
      document.getElementById('endTime').value = minToInput(end);
      document.getElementById('deleteBtn').style.display = event ? '' : 'none';
      renderPriorities();
      ensureValidEnd();
      clearFormError();
      document.getElementById('eventOverlay').classList.add('on');
      document.body.style.overflow = 'hidden';
    }
    function closeEventSheet() {
      document.getElementById('eventOverlay').classList.remove('on');
      document.body.style.overflow = '';
      document.activeElement && document.activeElement.blur();
      editingKey = null;
      clearFormError();
    }
    function openQuickAdd() {
      const date = selectedDate();
      let start = 9 * 60;
      if (isToday(date)) {
        const now = new Date();
        start = clamp(Math.ceil((now.getHours() * 60 + now.getMinutes()) / SLOT_MIN) * SLOT_MIN, DAY_START, DAY_END - 60);
      }
      openEventSheet(null, toIso(date), start);
    }
    function ensureValidEnd() {
      const startInput = document.getElementById('startTime');
      const endInput = document.getElementById('endTime');
      const start = inputToMinute(startInput.value);
      let end = inputToMinute(endInput.value, true);
      if (!Number.isInteger(end) || end <= start) {
        end = Math.min(start + 60, DAY_END);
        endInput.value = minToInput(end);
      }
      clearFormError();
    }
    function setDuration(minutes) {
      const start = inputToMinute(document.getElementById('startTime').value);
      if (!Number.isInteger(start)) return;
      document.getElementById('endTime').value = minToInput(Math.min(start + minutes, DAY_END));
      ensureValidEnd();
    }
    function dayEvents(dateIso, source = events) {
      return Object.entries(source)
        .map(([key, event]) => ({ key, event, meta: parseEventKey(key) }))
        .filter(item => item.meta && item.meta.date === dateIso)
        .sort((a, b) => a.event.startMin - b.event.startMin || a.event.endMin - b.event.endMin || a.event.title.localeCompare(b.event.title, 'ja'));
    }
    function showFormError(message) {
      document.getElementById('formErrorText').textContent = message;
      document.getElementById('formError').classList.add('on');
    }
    function clearFormError() {
      document.getElementById('formError').classList.remove('on');
    }
    function saveEvent() {
      const titleInput = document.getElementById('eventTitle');
      const title = titleInput.value.trim();
      if (!title) {
        showFormError('タイトルを入力してください。');
        titleInput.focus();
        return;
      }
      const startMin = inputToMinute(document.getElementById('startTime').value);
      const endMin = inputToMinute(document.getElementById('endTime').value, true);
      if (!Number.isInteger(startMin) || startMin < DAY_START || startMin >= DAY_END || !Number.isInteger(endMin) || endMin <= startMin || endMin > DAY_END) {
        showFormError('終了時刻は開始時刻より後にしてください。');
        return;
      }
      const wasEditing = !!editingKey;
      const existing = editingKey ? events[editingKey] : null;
      const id = cleanId(existing && existing.id) || cleanId(parseEventKey(editingKey || '')?.id) || createId();
      const newKey = makeKey(editingDate, startMin, id);
      if (editingKey && editingKey !== newKey) delete events[editingKey];
      events[newKey] = {
        id,
        title,
        memo: document.getElementById('eventMemo').value.trim(),
        startMin,
        endMin,
        priority: selectedPriority
      };
      persistEvents();
      closeEventSheet();
      render();
      showToast(wasEditing ? '予定を更新しました' : '予定を追加しました');
    }
    function deleteEvent() {
      if (!editingKey || !events[editingKey]) return;
      if (!confirm(`「${events[editingKey].title}」を削除しますか？`)) return;
      delete events[editingKey];
      persistEvents();
      closeEventSheet();
      render();
      showToast('予定を削除しました');
    }

    /* Rendering */
    function render() {
      const monday = startOfWeek(weekOffset);
      const sunday = addDays(monday, 6);
      const sameMonth = monday.getMonth() === sunday.getMonth();
      document.getElementById('weekLabel').textContent = sameMonth
        ? `${monday.getFullYear()}年 ${monday.getMonth() + 1}月${monday.getDate()}日 — ${sunday.getDate()}日`
        : `${monday.getMonth() + 1}月${monday.getDate()}日 — ${sunday.getMonth() + 1}月${sunday.getDate()}日`;
      document.getElementById('todayBtn').style.visibility = weekOffset === 0 && selectedDay === todayDayIndex() ? 'hidden' : 'visible';
      renderDayStrip(monday);
      renderDayHeader();
      renderTimeline();
    }
    function renderDayStrip(monday) {
      const strip = document.getElementById('dayStrip');
      strip.innerHTML = '';
      DAYS.forEach((dayName, index) => {
        const date = addDays(monday, index);
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `day-btn${index === selectedDay ? ' selected' : ''}${isToday(date) ? ' today' : ''}`;
        button.setAttribute('aria-label', `${date.getMonth() + 1}月${date.getDate()}日 ${DAY_NAMES[index]}`);
        button.setAttribute('aria-current', index === selectedDay ? 'date' : 'false');
        button.innerHTML = `<span class="dow">${dayName}</span><span class="dnum">${date.getDate()}</span>`;
        button.addEventListener('click', () => selectDay(index));
        strip.appendChild(button);
      });
    }
    function renderDayHeader() {
      const date = selectedDate();
      const dateIso = toIso(date);
      const items = dayEvents(dateIso);
      const total = items.reduce((sum, item) => sum + item.event.endMin - item.event.startMin, 0);
      document.getElementById('dayEyebrow').textContent = isToday(date) ? 'TODAY / FOCUS' : `${date.getFullYear()} / ${pad(date.getMonth() + 1)} / ${pad(date.getDate())}`;
      document.getElementById('dayHeading').innerHTML = `${date.getMonth() + 1}月${date.getDate()}日 <span>${DAY_NAMES[selectedDay]}</span>`;
      document.getElementById('eventCount').textContent = items.length;
      document.getElementById('plannedTime').textContent = durationText(total);
      document.getElementById('emptyBanner').classList.toggle('on', items.length === 0);
    }
    function buildOverlapLayout(items) {
      const result = new Map();
      let group = [];
      let groupEnd = -1;
      function flush() {
        if (!group.length) return;
        const laneEnds = [];
        group.forEach(item => {
          let lane = laneEnds.findIndex(end => end <= item.event.startMin);
          if (lane === -1) { lane = laneEnds.length; laneEnds.push(item.event.endMin); }
          else laneEnds[lane] = item.event.endMin;
          item._lane = lane;
        });
        const lanes = laneEnds.length;
        group.forEach(item => result.set(item.key, { lane: item._lane, lanes, overlaps: lanes > 1 }));
        group = [];
        groupEnd = -1;
      }
      items.forEach(item => {
        if (group.length && item.event.startMin >= groupEnd) flush();
        group.push(item);
        groupEnd = Math.max(groupEnd, item.event.endMin);
      });
      flush();
      return result;
    }
    function renderTimeline() {
      const rail = document.getElementById('timeRail');
      const layer = document.getElementById('eventLayer');
      const timeline = document.getElementById('timeline');
      const hourHeight = HOUR_HEIGHT();
      const dateIso = toIso(selectedDate());
      const items = dayEvents(dateIso);
      const layout = buildOverlapLayout(items);
      rail.innerHTML = '';
      layer.innerHTML = '';
      for (let hour = DAY_START / 60; hour <= DAY_END / 60; hour += 1) {
        const label = document.createElement('div');
        label.className = 'time-label';
        label.style.top = `${(hour * 60 - DAY_START) / 60 * hourHeight}px`;
        label.textContent = minToTime(hour * 60);
        rail.appendChild(label);
      }
      items.forEach(item => {
        const event = item.event;
        const position = layout.get(item.key);
        const duration = event.endMin - event.startMin;
        const top = (event.startMin - DAY_START) / 60 * hourHeight + 2;
        const height = Math.max(30, duration / 60 * hourHeight - 4);
        const gap = position.lanes > 1 ? 3 : 8;
        const laneWidth = 100 / position.lanes;
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `event ${PRIORITIES[normalizePriority(event.priority)].cls}${duration <= 30 ? ' compact' : ''}${duration <= 15 ? ' tiny' : ''}${position.overlaps ? ' overlap' : ''}`;
        button.style.top = `${top}px`;
        button.style.height = `${height}px`;
        button.style.left = `calc(${position.lane * laneWidth}% + ${gap}px)`;
        button.style.width = `calc(${laneWidth}% - ${gap + 5}px)`;
        button.setAttribute('aria-label', `${event.title} ${minToTime(event.startMin)}から${minToTime(event.endMin)}`);
        button.innerHTML = `<span class="ev-time">${minToTime(event.startMin)} — ${minToTime(event.endMin)}${position.overlaps ? ' ・ 重複' : ''}</span><span class="ev-title">${esc(event.title)}</span>${event.memo ? `<span class="ev-memo">${esc(event.memo)}</span>` : ''}`;
        button.addEventListener('click', click => { click.stopPropagation(); openEventSheet(item.key, dateIso, event.startMin); });
        layer.appendChild(button);
      });
      if (isToday(selectedDate())) {
        const now = new Date();
        const minute = now.getHours() * 60 + now.getMinutes();
        if (minute >= DAY_START && minute <= DAY_END) {
          const line = document.createElement('div');
          line.className = 'now-line';
          line.style.top = `${(minute - DAY_START) / 60 * hourHeight}px`;
          layer.appendChild(line);
        }
      }
      timeline.onclick = event => {
        if (event.target !== timeline && event.target !== layer) return;
        const rect = timeline.getBoundingClientRect();
        const y = event.clientY - rect.top;
        const minute = clamp(snapMinute(DAY_START + y / hourHeight * 60), DAY_START, DAY_END - SLOT_MIN);
        openEventSheet(null, dateIso, minute);
      };
    }
    function scrollToRelevantTime() {
      requestAnimationFrame(() => {
        const dateIso = toIso(selectedDate());
        const first = dayEvents(dateIso)[0];
        let minute = first ? first.event.startMin : 9 * 60;
        if (isToday(selectedDate())) {
          const now = new Date();
          minute = clamp(now.getHours() * 60 + now.getMinutes() - 60, DAY_START, DAY_END);
        }
        const card = document.querySelector('.timeline-card');
        const target = card.offsetTop + 48 + (minute - DAY_START) / 60 * HOUR_HEIGHT();
        window.scrollTo({ top: Math.max(0, target - 220), behavior: 'smooth' });
      });
    }

    /* Backup */
    function countEvents(source = events) { return Object.keys(source || {}).length; }
    function cloneEvents(source) { return JSON.parse(JSON.stringify(source || {})); }
    function localStamp() {
      const now = new Date();
      return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
    }
    function makeBackup(reason = 'manual') {
      return {
        kind: BACKUP_KIND,
        version: 3,
        app: 'WEEK FLOW',
        reason,
        exportedAt: new Date().toISOString(),
        exportedAtLocal: new Date().toLocaleString('ja-JP'),
        eventCount: countEvents(),
        events: cloneEvents(events)
      };
    }
    function downloadJson(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    function exportBackup(reason = 'manual') {
      const prefix = reason === 'pre-import' ? 'week-flow-safety-backup' : 'week-flow-backup';
      downloadJson(makeBackup(reason), `${prefix}_${localStamp()}.json`);
      setBackupStatus(`${countEvents()}件のバックアップを書き出しました。`, 'ok');
    }
    function openBackupSheet() {
      resetPendingImport(false);
      document.getElementById('backupSummary').textContent = `現在の予定: ${countEvents()}件`;
      document.getElementById('backupOverlay').classList.add('on');
      document.body.style.overflow = 'hidden';
    }
    function closeBackupSheet() {
      document.getElementById('backupOverlay').classList.remove('on');
      document.body.style.overflow = '';
    }
    function setBackupStatus(message, tone = '') {
      const status = document.getElementById('backupStatus');
      status.className = `b-status ${tone}`.trim();
      status.textContent = message || '';
    }
    function resetPendingImport(keepStatus) {
      pendingImport = null;
      document.getElementById('backupReview').classList.remove('on');
      document.getElementById('backupFile').value = '';
      if (!keepStatus) setBackupStatus('');
    }
    function chooseBackupFile() { resetPendingImport(false); document.getElementById('backupFile').click(); }
    async function handleImportFile(file) {
      if (!file) return;
      if (file.size > 1024 * 1024) { setBackupStatus('1MB以下のJSONファイルを選んでください。', 'err'); return; }
      try {
        const data = JSON.parse(await file.text());
        pendingImport = parseBackup(data);
        showImportReview(file.name, pendingImport);
      } catch (error) {
        setBackupStatus(error && error.message ? error.message : 'バックアップを読み込めませんでした。', 'err');
      }
    }
    function parseBackup(data) {
      if (!data || typeof data !== 'object' || Array.isArray(data)) throw new Error('JSONバックアップの形式が正しくありません。');
      let raw = data;
      let source = '旧形式JSON';
      let exportedAt = '不明';
      if (data.events && typeof data.events === 'object' && !Array.isArray(data.events)) {
        raw = data.events;
        source = data.kind === BACKUP_KIND ? 'WEEK FLOW' : 'events形式JSON';
        exportedAt = data.exportedAtLocal || formatIsoDate(data.exportedAt) || '不明';
      }
      const normalized = normalizeEvents(raw);
      if (!normalized.count) throw new Error('取り込める予定が見つかりませんでした。');
      return { ...normalized, source, exportedAt };
    }
    function formatIsoDate(value) {
      const date = value ? new Date(value) : null;
      return !date || Number.isNaN(date.getTime()) ? '' : date.toLocaleString('ja-JP');
    }
    function showImportReview(name, data) {
      const sameEvents = Object.keys(data.events).filter(key => events[key]).length;
      document.getElementById('backupFileName').textContent = name;
      document.getElementById('backupCount').textContent = `${data.count}件`;
      document.getElementById('backupOverlap').textContent = sameEvents ? `${sameEvents}件` : 'なし';
      document.getElementById('backupExportedAt').textContent = data.exportedAt;
      document.getElementById('backupSource').textContent = data.skipped ? `${data.source} / ${data.skipped}件除外` : data.source;
      document.getElementById('backupReview').classList.add('on');
      setBackupStatus('内容を確認して取り込み方法を選んでください。', 'warn');
    }
    function mergeEvents(base, incoming, replaceMode) {
      return replaceMode ? cloneEvents(incoming) : Object.assign({}, cloneEvents(base), cloneEvents(incoming));
    }
    function applyPendingImport(mode) {
      if (!pendingImport) { setBackupStatus('先にバックアップファイルを選んでください。', 'err'); return; }
      const replacing = mode === 'replace';
      const message = replacing
        ? '現在の予定をすべて置き換えます。安全用バックアップを書き出してから続けますか？'
        : '現在の予定に追加します。時間が重なる予定もそのまま保持します。続けますか？';
      if (!confirm(message)) return;
      const importedCount = pendingImport.count;
      exportBackup('pre-import');
      events = mergeEvents(events, pendingImport.events, replacing);
      persistEvents();
      render();
      document.getElementById('backupSummary').textContent = `現在の予定: ${countEvents()}件`;
      resetPendingImport(true);
      setBackupStatus(`${importedCount}件を読み込みました。`, 'ok');
    }

    document.getElementById('startTime').addEventListener('change', ensureValidEnd);
    document.getElementById('endTime').addEventListener('change', clearFormError);
    document.getElementById('eventTitle').addEventListener('input', clearFormError);
    document.getElementById('eventTitle').addEventListener('keydown', event => {
      if (event.key === 'Enter') { event.preventDefault(); document.getElementById('eventMemo').focus(); }
    });
    document.getElementById('eventOverlay').addEventListener('click', event => { if (event.target.id === 'eventOverlay') closeEventSheet(); });
    document.getElementById('backupOverlay').addEventListener('click', event => { if (event.target.id === 'backupOverlay') closeBackupSheet(); });
    document.addEventListener('keydown', event => {
      if (event.key !== 'Escape') return;
      if (document.getElementById('eventOverlay').classList.contains('on')) closeEventSheet();
      else if (document.getElementById('backupOverlay').classList.contains('on')) closeBackupSheet();
    });

    loadEvents();
    render();
    setTimeout(scrollToRelevantTime, 180);
  </script>
</body>
</html>
